<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Kiro Workshop - GS25 편의점 AI 도우미 만들기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.min.css">
  <style>
    :root {
      --theme-color: #0066CC;
      --sidebar-width: 280px;
    }
    .sidebar-nav > ul > li > p {
      font-weight: bold;
      color: #0066CC;
      margin: 15px 0 5px;
    }
    blockquote {
      border-left: 4px solid #0066CC;
      padding: 12px 16px;
      margin: 16px 0;
      background: #f8f9fa;
      border-radius: 4px;
    }
    blockquote strong:first-child {
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Kiro Workshop - GS25',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0,
      search: {
        placeholder: '검색...',
        noData: '결과 없음',
      },
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
